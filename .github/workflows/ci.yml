name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: ./.github/actions/setup-dotnet

      - name: Restore
        run: dotnet restore Weave.slnx

      - name: Build
        run: dotnet build Weave.slnx --no-restore -c Release

      - name: Test
        run: >-
          dotnet test --solution Weave.slnx --no-build -c Release
          -- --report-xunit-trx --report-xunit-trx-filename results.trx --results-directory ./test-results

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040 # v2
        if: always()
        with:
          files: test-results/**/*.trx
          check_name: 'Test Results'

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: test-results
          path: ./test-results/**/*.trx
          retention-days: 30

  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup .NET
        uses: ./.github/actions/setup-dotnet

      - name: Restore
        run: dotnet restore Weave.slnx

      - name: Audit dependencies
        run: |
          dotnet list Weave.slnx package --deprecated
          dotnet list Weave.slnx package --vulnerable --include-transitive

      - name: Build (warnings as errors)
        run: dotnet build Weave.slnx --no-restore -c Release /p:TreatWarningsAsErrors=true

      - name: Check formatting
        run: >-
          dotnet format Weave.slnx --no-restore --verify-no-changes --verbosity diagnostic
          --exclude src/Foundation/Weave.Shared/

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Dependency Review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4
        with:
          fail-on-severity: high
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0
          comment-summary-in-pr: always
